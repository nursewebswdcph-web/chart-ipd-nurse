<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nursing Chart - ระบบบันทึกเวชระเบียนทางการพยาบาล</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        [x-cloak] { display: none !important; }
        .chart-indigo { background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%); }
    </style>
</head>
<body x-data="nursingChart()" x-init="init()">

    <header class="chart-indigo text-white sticky top-0 z-[100] shadow-lg">
        <div class="container mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-5">
                <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center text-3xl shadow-inner">
                    <i class="fa-solid fa-user-nurse"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-tight" x-text="patient.name || 'กำลังโหลดข้อมูล...'"></h1>
                    <p class="text-sm opacity-80 font-medium">
                        HN: <span x-text="patient.hn"></span> | AN: <span x-text="patient.an"></span> | 
                        เตียง: <span class="text-yellow-300 font-bold" x-text="patient.bed"></span>
                    </p>
                </div>
            </div>
            <div class="flex gap-4 text-center text-xs">
                <div class="bg-black/20 px-4 py-2 rounded-xl border border-white/10">
                    <span class="block opacity-60 uppercase">Age</span>
                    <span class="font-bold text-sm" x-text="patient.ageDisplay"></span>
                </div>
                <div class="bg-black/20 px-4 py-2 rounded-xl border border-white/10">
                    <span class="block opacity-60 uppercase">Doctor</span>
                    <span class="font-bold text-sm" x-text="patient.doctor"></span>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <aside class="lg:col-span-3 space-y-3">
            <template x-for="tab in tabs" :key="tab.id">
                <button @click="currentTab = tab.id" 
                        :class="currentTab === tab.id ? 'bg-indigo-600 text-white shadow-indigo-100' : 'bg-white text-slate-500 hover:bg-slate-50'"
                        class="w-full flex items-center justify-between p-4 rounded-2xl font-bold transition-all shadow-sm border border-slate-100">
                    <span class="flex items-center"><i :class="tab.icon" class="mr-3"></i> <span x-text="tab.name"></span></span>
                    <i class="fa-solid fa-chevron-right text-[10px]" x-show="currentTab !== tab.id"></i>
                </button>
            </template>
        </aside>

        <section class="lg:col-span-9 space-y-6">
            
            <div x-show="currentTab === 'vitals'" class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-100 animate-in fade-in duration-500">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-xl font-black text-slate-800 uppercase tracking-wide">Vital Signs Observation</h3>
                    <button class="bg-indigo-600 text-white px-6 py-2 rounded-xl text-sm font-bold shadow-lg hover:bg-indigo-700 transition">+ บันทึกใหม่</button>
                </div>

                <div class="overflow-x-auto rounded-2xl border border-slate-50">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 text-slate-400 font-bold uppercase text-[10px]">
                            <tr>
                                <th class="p-4">วันที่/เวลา</th>
                                <th class="p-4">BP (mmHg)</th>
                                <th class="p-4">PR (bpm)</th>
                                <th class="p-4">RR (min)</th>
                                <th class="p-4">T (°C)</th>
                                <th class="p-4">SpO2 (%)</th>
                                <th class="p-4">Pain</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-50">
                            <tr class="hover:bg-slate-50 transition-colors">
                                <td class="p-4 font-bold">10/03/2569 22:30</td>
                                <td class="p-4">120/80</td>
                                <td class="p-4">82</td>
                                <td class="p-4">20</td>
                                <td class="p-4">36.8</td>
                                <td class="p-4">98</td>
                                <td class="p-4">0</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div x-show="currentTab === 'notes'" x-cloak class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-100">
                <h3 class="text-xl font-black text-slate-800 mb-6 uppercase tracking-wide">Nursing Progress Note</h3>
                <textarea class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-6 text-sm focus:border-indigo-500 outline-none mb-4" rows="5" placeholder="บันทึกอาการและการพยาบาล..."></textarea>
                <div class="flex justify-end">
                    <button class="bg-indigo-600 text-white px-10 py-3 rounded-xl font-bold">บันทึกโน้ต</button>
                </div>
            </div>

        </section>
    </main>

    <script>
        function nursingChart() {
            return {
                currentTab: 'vitals',
                patient: { name: '', hn: '', an: '', bed: '', ageDisplay: '', doctor: '' },
                tabs: [
                    { id: 'vitals', name: 'Vital Signs', icon: 'fa-solid fa-heart-pulse' },
                    { id: 'notes', name: 'Nurse Note', icon: 'fa-solid fa-pen-to-square' },
                    { id: 'io', name: 'Intake / Output', icon: 'fa-solid fa-droplet' },
                    { id: 'med', name: 'Medication', icon: 'fa-solid fa-pills' }
                ],
                init() {
                    // ดึงค่า AN จาก URL (เช่น chart.html?an=12345)
                    const params = new URLSearchParams(window.location.search);
                    const an = params.get('an');
                    if (an) {
                        this.fetchPatientData(an);
                    }
                },
                async fetchPatientData(an) {
                    // จำลองการดึงข้อมูลจาก GAS โดยใช้ AN
                    // ในที่นี้ต้องเรียกใช้ API_URL ของคุณ
                    console.log("Fetching data for AN:", an);
                    // ตัวอย่าง: this.patient = await fetch(...);
                }
            }
        }
    </script>
</body>
</html>

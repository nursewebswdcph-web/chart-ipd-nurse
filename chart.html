<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nursing Chart | Loading...</title>
    <link rel="icon" type="image/png" href="https://png.pngtree.com/png-vector/20250520/ourmid/pngtree-healthcare-nurse-station-symbol-for-medical-facilities-png-image_16333172.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; color: #1e293b; overflow: hidden; font-size: 16px; }
        [x-cloak] { display: none !important; }
        .chart-sidebar { height: calc(100vh - 120px); }
        .a4-preview { 
            width: 210mm; min-height: 297mm; padding: 20mm; 
            margin: auto; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            border-radius: 4px;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        /* แก้ปัญหารายการเอกสารจม */
        .dropdown-menu { z-index: 9999 !important; position: absolute; }
        @media print {
            .no-print { display: none !important; }
            body { background: white; overflow: visible; }
            .a4-preview { width: 100%; box-shadow: none; margin: 0; padding: 0; border: none; }
            .chart-sidebar { height: auto; overflow: visible; }
        }
    </style>
</head>
<body x-data="nursingChart()" 
      x-init="init()" 
      x-effect="document.title = patient ? 'Nursing Chart | ' + patient.name : 'Nursing Chart | Loading...'">

    <div x-show="dialog.show" class="fixed inset-0 z-[20000] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md" x-cloak>
        <div class="bg-white rounded-[2rem] shadow-2xl max-w-sm w-full overflow-hidden border border-white/20 p-8 text-center">
            <template x-if="dialog.type === 'confirm'"><div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fa-solid fa-triangle-exclamation text-3xl"></i></div></template>
            <template x-if="dialog.type === 'alert'"><div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fa-solid fa-circle-info text-3xl"></i></div></template>
            <h3 class="text-xl font-black text-slate-800 mb-2" x-text="dialog.title"></h3>
            <p class="text-sm text-slate-400 mb-6" x-text="dialog.msg"></p>
            <div class="flex gap-3">
                <template x-if="dialog.type === 'confirm'"><button @click="dialog.show = false" class="flex-1 py-3 rounded-xl font-bold text-slate-400 hover:bg-slate-50 transition text-sm">ยกเลิก</button></template>
                <button @click="handleDialogConfirm()" :class="dialog.type === 'confirm' ? 'bg-red-600' : 'bg-indigo-600'" class="flex-1 py-3 rounded-xl font-bold text-white shadow-lg transition active:scale-95 text-sm" x-text="dialog.confirmBtnText"></button>
            </div>
        </div>
    </div>

    <div x-show="isLoading" class="fixed inset-0 z-[19000] bg-slate-900/40 backdrop-blur-sm flex flex-col items-center justify-center text-white" x-cloak>
        <div class="bg-white p-6 rounded-3xl shadow-2xl flex flex-col items-center">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-500 border-t-transparent mb-4"></div>
            <p class="text-slate-600 font-bold">กำลังดึงข้อมูลเวชระเบียน...</p>
        </div>
    </div>

    <header class="h-32 bg-white border-b border-slate-200 px-8 flex items-center justify-between no-print shadow-sm z-50">
        <div class="flex items-center gap-6">
            <div class="bg-indigo-600 text-white w-20 h-20 rounded-2xl flex items-center justify-center text-4xl shadow-lg shadow-indigo-100 shrink-0">
                <i class="fa-solid fa-user-injured"></i>
            </div>
            
            <div class="flex flex-col">
                <h1 class="text-2xl font-black text-slate-800 leading-none" x-text="patient?.name || '---'"></h1>
                <div class="flex gap-4 text-sm text-slate-400 font-bold mt-2 uppercase tracking-wide">
                    <span x-text="'HN: ' + (patient?.hn || '-')"></span>
                    <span x-text="'AN: ' + (patient?.an || '-')"></span>
                </div>
                <div class="text-sm font-bold text-indigo-600 mt-1" x-text="'แพทย์: นพ.' + (patient?.doctor || '-')"></div>
            </div>
        </div>

        <div class="flex items-center gap-10">
            <div class="text-right hidden xl:block max-w-xs">
                <span class="block text-[10px] font-black text-slate-300 uppercase tracking-widest mb-1">Diagnosis</span>
                <span class="text-base font-bold text-slate-700 leading-tight" x-text="patient?.dx || '-'"></span>
            </div>
            
            <div class="bg-emerald-50 border-2 border-emerald-200 px-8 py-3 rounded-2xl text-center shadow-inner min-w-[140px]">
                <span class="block text-[10px] font-black text-emerald-400 uppercase tracking-widest mb-1">Bed Number</span>
                <span class="text-4xl font-black text-emerald-700" x-text="patient?.bed || '-'"></span>
            </div>

            <button @click="window.close()" class="text-slate-200 hover:text-red-500 transition-colors ml-4"><i class="fa-solid fa-circle-xmark text-3xl"></i></button>
        </div>
    </header>

    <div class="flex">
        <aside class="w-96 border-r border-slate-200 bg-white chart-sidebar overflow-y-auto p-4 no-print scrollbar-hide relative">
            <div class="flex items-center justify-between mb-6 mt-2 px-3">
                <h4 class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">Nursing Documentation</h4>
                <div class="relative" x-data="{ open: false }">
                    <button @click="open = !open" class="text-indigo-600 hover:text-indigo-800 transition-colors">
                        <i class="fa-solid fa-circle-plus text-2xl"></i>
                    </button>
                    <div x-show="open" @click.away="open = false" 
                         class="dropdown-menu right-0 mt-2 w-72 bg-white border border-slate-100 rounded-2xl shadow-2xl p-2" x-cloak>
                        <div class="p-3 border-b border-slate-50 mb-1 text-[10px] font-bold text-slate-400 uppercase">เลือกเพิ่มเอกสารเพิ่มเติม</div>
                        <template x-for="opt in extraOptions" :key="opt.id">
                            <button @click="addForm(opt); open = false" class="w-full text-left p-3 text-[13px] hover:bg-indigo-50 rounded-xl transition-colors font-bold text-slate-600" x-text="opt.title"></button>
                        </template>
                    </div>
                </div>
            </div>

            <nav class="space-y-2 px-1">
                <template x-for="form in activeForms" :key="form.id">
                    <div class="group relative">
                        <button @click="selectForm(form)" 
                                :class="currentForm.id === form.id ? 'bg-indigo-600 text-white shadow-xl shadow-indigo-100 scale-[1.02]' : 'text-slate-500 hover:bg-slate-50'"
                                class="w-full text-left p-4 rounded-2xl transition-all duration-300 flex items-center gap-3">
                            <span class="text-[14px] font-bold leading-snug flex-1" x-text="form.title"></span>
                            <i class="fa-solid fa-chevron-right text-[10px] opacity-40"></i>
                        </button>
                        <button x-show="!form.isMain" @click.stop="removeForm(form.id)" 
                                class="absolute -right-2 top-2 w-6 h-6 bg-red-500 text-white rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all border-2 border-white shadow-md">
                            <i class="fa-solid fa-xmark text-[10px]"></i>
                        </button>
                    </div>
                </template>
            </nav>
        </aside>

        <main class="flex-1 chart-sidebar overflow-y-auto bg-slate-100/50 p-6 lg:p-10 scrollbar-hide">
            <div class="max-w-[210mm] mx-auto mb-8 flex justify-between items-center no-print">
                <div class="flex bg-white p-1 rounded-2xl shadow-sm border border-slate-200">
                    <button @click="viewMode = 'preview'" :class="viewMode === 'preview' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400'" class="px-8 py-2.5 rounded-xl text-[11px] font-bold transition-all uppercase tracking-widest">Preview Mode</button>
                    <button @click="viewMode = 'edit'" :class="viewMode === 'edit' ? 'bg-emerald-600 text-white shadow-md' : 'text-slate-400'" class="px-8 py-2.5 rounded-xl text-[11px] font-bold transition-all uppercase tracking-widest">Data Entry</button>
                </div>
                <button @click="window.print()" class="bg-white hover:bg-slate-50 text-slate-800 px-6 py-2.5 rounded-xl text-[11px] font-black flex items-center gap-2 border border-slate-200 shadow-sm transition-all">
                    <i class="fa-solid fa-print text-indigo-600"></i> พิมพ์เอกสาร (A4)
                </button>
            </div>

            <div class="relative min-h-screen">
                <div x-show="viewMode === 'preview'" class="a4-preview mb-20 animate-fade-in">
                    <div class="border-b-4 border-slate-900 pb-6 mb-8 flex justify-between items-start">
                        <div class="flex items-start gap-4">
                            <img src="https://swdcph.moph.go.th/intranet/login/images/logo_swd.png" class="h-16 w-auto grayscale">
                            <div>
                                <h2 class="text-2xl font-black text-slate-900 uppercase tracking-tight" x-text="currentForm.title"></h2>
                                <p class="text-[11px] text-slate-500 font-bold mt-1 tracking-wider uppercase">IPD Nursing Record System | Sawang Daen Din Hospital</p>
                            </div>
                        </div>
                    </div>
                    <div class="py-32 text-center text-slate-200 font-black">
                        <i class="fa-solid fa-file-invoice text-8xl mb-4"></i>
                        <h4 class="text-2xl">UNDER DEVELOPMENT</h4>
                        <p class="text-sm mt-2" x-text="'Content for ID: ' + currentForm.id"></p>
                    </div>
                </div>

                <div x-show="viewMode === 'edit'" class="max-w-4xl mx-auto bg-white rounded-[3rem] p-12 shadow-2xl border border-indigo-50 mb-20">
                    <div class="flex items-center gap-4 mb-10 border-b border-slate-50 pb-6">
                        <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center text-3xl shadow-inner"><i class="fa-solid fa-pen-nib"></i></div>
                        <div>
                            <h3 class="text-2xl font-black text-slate-800" x-text="currentForm.title"></h3>
                            <p class="text-sm text-slate-400 mt-1 font-bold">บันทึกข้อมูลการพยาบาลสำหรับผู้ป่วยรายนี้</p>
                        </div>
                    </div>
                    <div class="mt-20 text-center">
                        <button class="w-full bg-emerald-600 text-white py-6 rounded-3xl font-black text-xl shadow-xl shadow-emerald-100 hover:bg-emerald-700 transition-all active:scale-95">
                            <i class="fa-solid fa-cloud-arrow-up mr-2"></i> บันทึกข้อมูลแบบฟอร์ม
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="chart.js"></script>
</body>
</html>

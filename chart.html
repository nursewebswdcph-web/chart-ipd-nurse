<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nursing Chart - ระบบบันทึกเวชระเบียนทางการพยาบาล</title>
    <link rel="icon" type="image/png" href="https://png.pngtree.com/png-vector/20250520/ourmid/pngtree-healthcare-nurse-station-symbol-for-medical-facilities-png-image_16333172.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; overflow: hidden; }
        [x-cloak] { display: none !important; }
        .chart-sidebar { height: calc(100vh - 80px); }
        .a4-preview { width: 210mm; min-height: 297mm; padding: 20mm; margin: auto; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        @media print {
            body { background: white; overflow: visible; }
            .no-print { display: none !important; }
            .a4-preview { width: 100%; box-shadow: none; margin: 0; padding: 0; }
        }
    </style>
</head>
<body x-data="nursingChart()" x-init="init()">

    <header class="h-20 bg-white border-b border-slate-200 px-6 flex items-center justify-between no-print shadow-sm">
        <div class="flex items-center gap-6">
            <div class="bg-indigo-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center text-2xl shadow-lg">
                <i class="fa-solid fa-folder-medical"></i>
            </div>
            <div>
                <h1 class="text-xl font-black text-slate-800" x-text="patient?.name"></h1>
                <div class="flex gap-4 text-xs text-slate-400 font-bold uppercase tracking-wider">
                    <span x-text="'HN: ' + patient?.hn"></span>
                    <span x-text="'AN: ' + patient?.an"></span>
                    <span x-text="'BED: ' + patient?.bed" class="text-emerald-600 font-black"></span>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <div class="relative" x-data="{ open: false }">
                <button @click="open = !open" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 transition-all">
                    <i class="fa-solid fa-plus-circle"></i> เพิ่มเอกสารอื่นๆ
                </button>
                <div x-show="open" @click.away="open = false" class="absolute right-0 mt-2 w-64 bg-white border rounded-2xl shadow-2xl p-2 z-50" x-cloak>
                    <template x-for="opt in extraOptions" :key="opt.id">
                        <button @click="addForm(opt); open = false" class="w-full text-left p-3 text-xs hover:bg-indigo-50 rounded-xl transition-colors font-bold text-slate-600" x-text="opt.title"></button>
                    </template>
                </div>
            </div>
            <button @click="window.close()" class="text-slate-300 hover:text-red-500 transition-colors"><i class="fa-solid fa-circle-xmark text-2xl"></i></button>
        </div>
    </header>

    <div class="flex">
        <aside class="w-80 border-r border-slate-200 bg-white chart-sidebar overflow-y-auto p-4 no-print">
            <h4 class="text-[10px] font-black text-slate-300 uppercase tracking-[0.2em] mb-4 ml-2">Nursing Forms</h4>
            <nav class="space-y-1">
                <template x-for="form in activeForms" :key="form.id">
                    <div class="group relative">
                        <button @click="selectForm(form)" 
                                :class="currentForm.id === form.id ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-600 hover:bg-slate-50'"
                                class="w-full text-left p-4 rounded-2xl transition-all flex items-center gap-3">
                            <span class="text-xs font-bold leading-tight flex-1" x-text="form.title"></span>
                            <i class="fa-solid fa-chevron-right text-[10px] opacity-40"></i>
                        </button>
                        <button x-show="!form.isMain" @click.stop="removeForm(form.id)" class="absolute -right-2 top-2 w-6 h-6 bg-red-100 text-red-600 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity border-2 border-white shadow-sm">
                            <i class="fa-solid fa-xmark text-[10px]"></i>
                        </button>
                    </div>
                </template>
            </nav>
        </aside>

        <main class="flex-1 chart-sidebar overflow-y-auto bg-slate-50 p-8 scrollbar-hide">
            <div class="max-w-4xl mx-auto mb-6 flex justify-between items-center no-print">
                <div class="flex gap-2">
                    <button @click="viewMode = 'preview'" :class="viewMode === 'preview' ? 'bg-indigo-600 text-white' : 'bg-white text-slate-400'" class="px-6 py-2 rounded-xl text-xs font-bold shadow-sm transition-all">Preview (A4)</button>
                    <button @click="viewMode = 'edit'" :class="viewMode === 'edit' ? 'bg-emerald-600 text-white' : 'bg-white text-slate-400'" class="px-6 py-2 rounded-xl text-xs font-bold shadow-sm transition-all">แก้ไข/เพิ่มรายการ</button>
                </div>
                <button @click="window.print()" class="bg-white hover:bg-slate-50 text-slate-700 px-6 py-2 rounded-xl text-xs font-bold shadow-sm border border-slate-200 flex items-center gap-2 transition-all">
                    <i class="fa-solid fa-print"></i> พิมพ์เอกสาร (A4)
                </button>
            </div>

            <div class="relative">
                <div x-show="viewMode === 'preview'" class="a4-preview animate-scale-up">
                    <div class="border-b-2 border-slate-900 pb-4 mb-6 flex justify-between items-start">
                        <div>
                            <h2 class="text-xl font-black uppercase tracking-tight" x-text="currentForm.title"></h2>
                            <p class="text-xs text-slate-500 mt-1">Sawang Daen Din Hospital | Nursing Documentation System</p>
                        </div>
                        <div class="text-[10px] text-right text-slate-400 font-bold uppercase">
                            <div x-text="'Patient: ' + patient?.name"></div>
                            <div x-text="'AN: ' + patient?.an"></div>
                        </div>
                    </div>
                    <div class="text-slate-700 min-h-[800px] flex flex-col items-center justify-center border-2 border-dashed border-slate-100 rounded-3xl">
                        <i class="fa-solid fa-file-lines text-5xl text-slate-100 mb-4"></i>
                        <p class="text-slate-300 font-bold">รอการพัฒนาเนื้อหาของแบบฟอร์ม: <span x-text="currentForm.id"></span></p>
                    </div>
                </div>

                <div x-show="viewMode === 'edit'" class="max-w-4xl mx-auto bg-white rounded-[2rem] p-10 shadow-xl border border-indigo-50 animate-fade-in">
                    <h3 class="text-xl font-black text-slate-800 mb-6 flex items-center gap-3">
                        <i class="fa-solid fa-pen-to-square text-emerald-500"></i>
                        บันทึกข้อมูล: <span x-text="currentForm.title"></span>
                    </h3>
                    <div class="space-y-6">
                        <p class="text-slate-400 italic text-sm">ส่วนนี้สำหรับพยาบาลบันทึกข้อมูลลงฐานข้อมูล GAS...</p>
                        <button class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-emerald-100">บันทึกข้อมูลรายการนี้</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="chart.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nursing Chart | Loading...</title>
    <link rel="icon" type="image/png" href="https://png.pngtree.com/png-vector/20250520/ourmid/pngtree-healthcare-nurse-station-symbol-for-medical-facilities-png-image_16333172.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; color: #1e293b; overflow: hidden; font-size: 18px; }
        [x-cloak] { display: none !important; }
        /* ส่วนความสูงหน้าจอ */
        .chart-container { height: 100vh; display: flex; flex-direction: column; }
        .main-layout { flex: 1; display: flex; overflow: hidden; }
        .sidebar { width: 450px; background: white; border-right: 1px solid #e2e8f0; overflow-y: auto; position: relative; z-index: 10; }
        .content { flex: 1; overflow-y: auto; background-color: #f8fafc; padding: 40px; }
        
        /* กระดาษ A4 Preview */
        .a4-preview { 
            width: 210mm; min-height: 297mm; padding: 20mm; 
            margin: 0 auto 50px auto; background: white; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }
        
        /* แก้เมนูเอกสารจม */
        .extra-menu-container { position: relative; z-index: 9999 !important; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; overflow: visible; }
            .main-layout { display: block; overflow: visible; }
            .content { padding: 0; background: white; }
            .a4-preview { width: 100%; box-shadow: none; margin: 0; padding: 0; }
        }
    </style>
</head>
<body x-data="nursingChart()" x-init="init()" x-effect="document.title = patient ? 'Chart: ' + patient.name : 'Nursing Chart'">

    <div class="chart-container">
        <header class="h-32 bg-white border-b border-slate-200 px-10 flex items-center justify-between no-print shrink-0 shadow-sm z-20">
            <div class="flex items-center gap-8">
                <div class="bg-indigo-600 text-white w-20 h-20 rounded-2xl flex items-center justify-center text-4xl shadow-lg shadow-indigo-100 shrink-0">
                    <i class="fa-solid fa-user-injured"></i>
                </div>
                
                <div class="flex flex-col">
                    <h1 class="text-3xl font-black text-slate-800 leading-tight" x-text="patient?.name || 'กำลังโหลดข้อมูล...'"></h1>
                    <div class="flex gap-6 text-base text-slate-400 font-bold mt-1 uppercase tracking-wider">
                        <span x-text="'HN: ' + (patient?.hn || '-')"></span>
                        <span x-text="'AN: ' + (patient?.an || '-')"></span>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-10">
                <div class="text-right hidden xl:block">
                    <span class="block text-[11px] font-black text-slate-300 uppercase tracking-widest mb-1">Diagnosis / Physician</span>
                    <div class="text-lg font-bold text-slate-700 leading-tight" x-text="patient?.dx || 'Awaiting DX'"></div>
                    <div class="text-sm font-bold text-emerald-600 mt-1" x-text="'นพ.' + (patient?.doctor || '-')"></div>
                </div>
                
                <div class="bg-emerald-50 border-2 border-emerald-200 px-10 py-3 rounded-2xl text-center shadow-inner min-w-[150px]">
                    <span class="block text-[11px] font-black text-emerald-400 uppercase tracking-widest mb-1">Bed No.</span>
                    <span class="text-5xl font-black text-emerald-700" x-text="patient?.bed || '-'"></span>
                </div>

                <button @click="window.close()" class="text-slate-200 hover:text-red-500 transition-colors ml-4"><i class="fa-solid fa-circle-xmark text-4xl"></i></button>
            </div>
        </header>

        <div class="main-layout">
            <aside class="sidebar p-6 no-print scrollbar-hide">
                <div class="flex items-center justify-between mb-8 mt-2 px-3 extra-menu-container">
                    <h4 class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">Nursing Forms</h4>
                    
                    <div class="relative" x-data="{ open: false }">
                        <button @click="open = !open" class="text-indigo-600 hover:text-indigo-800 transition-all active:scale-90">
                            <i class="fa-solid fa-circle-plus text-3xl"></i>
                        </button>
                        <div x-show="open" @click.away="open = false" 
                             class="absolute right-0 mt-3 w-80 bg-white border border-slate-100 rounded-3xl shadow-2xl p-3 z-[9999]" x-cloak>
                            <div class="p-3 border-b border-slate-50 mb-2 text-[10px] font-bold text-slate-400 uppercase">เลือกเพิ่มเอกสารอื่นๆ</div>
                            <template x-for="opt in extraOptions" :key="opt.id">
                                <button @click="addForm(opt); open = false" 
                                        class="w-full text-left p-4 text-[14px] hover:bg-indigo-50 rounded-2xl transition-colors font-bold text-slate-600 mb-1" 
                                        x-text="opt.title"></button>
                            </template>
                        </div>
                    </div>
                </div>

                <nav class="space-y-3">
                    <template x-for="form in activeForms" :key="form.id">
                        <div class="group relative px-1">
                            <button @click="selectForm(form)" 
                                    :class="currentForm.id === form.id ? 'bg-indigo-600 text-white shadow-xl shadow-indigo-100 scale-[1.02]' : 'text-slate-500 hover:bg-slate-50'"
                                    class="w-full text-left p-5 rounded-[1.5rem] transition-all duration-300 flex items-center gap-4">
                                <span class="text-[16px] font-bold leading-snug flex-1" x-text="form.title"></span>
                                <i class="fa-solid fa-chevron-right text-[11px] opacity-40"></i>
                            </button>
                            <button x-show="!form.isMain" @click.stop="removeForm(form.id)" 
                                    class="absolute -right-1 top-2 w-7 h-7 bg-red-500 text-white rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all border-2 border-white shadow-md">
                                <i class="fa-solid fa-xmark text-[12px]"></i>
                            </button>
                        </div>
                    </template>
                </nav>
            </aside>

            <main class="content scrollbar-hide">
                <div class="max-w-[210mm] mx-auto mb-10 flex justify-between items-center no-print">
                    <div class="flex bg-white p-1.5 rounded-3xl shadow-sm border border-slate-200">
                        <button @click="viewMode = 'preview'" :class="viewMode === 'preview' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400'" class="px-10 py-3 rounded-2xl text-[12px] font-bold transition-all uppercase tracking-widest">Preview Mode</button>
                        <button @click="viewMode = 'edit'" :class="viewMode === 'edit' ? 'bg-emerald-600 text-white shadow-md' : 'text-slate-400'" class="px-10 py-3 rounded-2xl text-[12px] font-bold transition-all uppercase tracking-widest">Data Entry</button>
                    </div>
                    <button @click="window.print()" class="bg-white hover:bg-slate-50 text-slate-800 px-8 py-3 rounded-2xl text-[13px] font-black flex items-center gap-3 border border-slate-200 shadow-sm transition-all active:scale-95">
                        <i class="fa-solid fa-print text-indigo-600 text-lg"></i> พิมพ์เอกสาร (A4)
                    </button>
                </div>

                <div class="relative">
                    <div x-show="viewMode === 'preview'" class="a4-preview animate-fade-in">
                        <div class="border-b-4 border-slate-900 pb-8 mb-10 flex justify-between items-end">
                            <div class="flex items-center gap-6">
                                <img src="https://swdcph.moph.go.th/intranet/login/images/logo_swd.png" class="h-20 w-auto grayscale">
                                <div>
                                    <h2 class="text-3xl font-black text-slate-900 uppercase tracking-tight" x-text="currentForm.title"></h2>
                                    <p class="text-[12px] text-slate-500 font-bold mt-1 tracking-widest uppercase">Nursing Record | Sawang Daen Din Hospital</p>
                                </div>
                            </div>
                        </div>
                        <div class="py-48 text-center text-slate-200 font-black">
                            <i class="fa-solid fa-file-signature text-9xl mb-6"></i>
                            <h4 class="text-3xl">UNDER DEVELOPMENT</h4>
                            <p class="text-slate-300 font-bold mt-2" x-text="'แบบฟอร์ม: ' + currentForm.id"></p>
                        </div>
                    </div>

                    <div x-show="viewMode === 'edit'" class="max-w-4xl mx-auto bg-white rounded-[3.5rem] p-16 shadow-2xl border border-indigo-50 mb-20">
                        <div class="flex items-center gap-6 mb-12 border-b border-slate-50 pb-8">
                            <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-3xl flex items-center justify-center text-4xl shadow-inner"><i class="fa-solid fa-pen-nib"></i></div>
                            <div>
                                <h3 class="text-3xl font-black text-slate-800" x-text="currentForm.title"></h3>
                                <p class="text-base text-slate-400 mt-1 font-bold italic">ระบุข้อมูลการพยาบาลสำหรับแบบฟอร์มนี้</p>
                            </div>
                        </div>
                        <div class="py-20 text-center bg-slate-50 rounded-[3rem] border-2 border-dashed border-slate-100">
                             <i class="fa-solid fa-database text-6xl text-slate-200 mb-4"></i>
                             <p class="text-slate-400 font-bold">ส่วนบันทึกข้อมูลจะพัฒนาแยกตามประเภทแบบฟอร์ม</p>
                        </div>
                        <div class="mt-16 pt-10 border-t border-slate-50">
                            <button class="w-full bg-emerald-600 text-white py-6 rounded-[2rem] font-black text-xl shadow-xl shadow-emerald-100 hover:bg-emerald-700 transition-all">
                                <i class="fa-solid fa-cloud-arrow-up mr-3"></i> บันทึกข้อมูลรายการนี้
                            </button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div x-show="dialog.show" class="fixed inset-0 z-[100000] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md" x-cloak>
        <div class="bg-white rounded-[2.5rem] shadow-2xl max-w-sm w-full p-8 text-center animate-in zoom-in duration-300">
            <div :class="dialog.type === 'confirm' ? 'bg-red-100 text-red-600' : 'bg-indigo-100 text-indigo-600'" 
                 class="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                <i :class="dialog.type === 'confirm' ? 'fa-solid fa-triangle-exclamation' : 'fa-solid fa-circle-info'" class="text-4xl"></i>
            </div>
            <h3 class="text-2xl font-black text-slate-800 mb-2" x-text="dialog.title"></h3>
            <p class="text-base text-slate-400 mb-8" x-text="dialog.msg"></p>
            <div class="flex gap-3">
                <template x-if="dialog.type === 'confirm'"><button @click="dialog.show = false" class="flex-1 py-4 rounded-2xl font-bold text-slate-400 hover:bg-slate-50 transition">ยกเลิก</button></template>
                <button @click="handleDialogConfirm()" :class="dialog.type === 'confirm' ? 'bg-red-600' : 'bg-indigo-600'" class="flex-1 py-4 rounded-2xl font-bold text-white shadow-lg transition active:scale-95" x-text="dialog.confirmBtnText"></button>
            </div>
        </div>
    </div>

    <div x-show="isLoading" class="fixed inset-0 z-[19000] bg-slate-900/50 backdrop-blur-sm flex items-center justify-center" x-cloak>
        <div class="bg-white p-8 rounded-3xl shadow-2xl flex flex-col items-center">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-500 border-t-transparent mb-4"></div>
            <p class="text-slate-600 font-bold">กำลังดึงข้อมูล...</p>
        </div>
    </div>

    <script src="chart.js"></script>
</body>
</html>

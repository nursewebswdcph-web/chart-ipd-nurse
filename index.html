<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPD Nurse Workbench</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        [x-cloak] { display: none !important; }
        .hospital-gradient { background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%); }
        .card-hover:hover { transform: translateY(-5px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        /* กำหนดความสูง Modal เพื่อไม่ให้ Navbar บัง */
        .modal-container { z-index: 10001; }
        .loader-overlay { z-index: 10002; }
    </style>
</head>
<body x-data="nurseApp()" x-init="init()">

    <div x-show="isLoading" class="loader-overlay fixed inset-0 bg-black/50 flex flex-col items-center justify-center text-white" x-cloak>
        <div class="animate-spin rounded-full h-16 w-16 border-4 border-t-emerald-400 border-white/20 mb-4"></div>
        <p class="text-lg">กำลังประมวลผล...</p>
    </div>

    <nav class="hospital-gradient text-white shadow-xl sticky top-0 z-[1000] px-4 py-2">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="https://swdcph.moph.go.th/intranet/login/images/logo_swd.png" alt="SWD Logo" class="h-12 w-auto bg-white rounded-full p-1">
                <div>
                    <h1 class="text-xl md:text-2xl font-bold tracking-wide leading-none">IPD Nurse Workbench</h1>
                    <div class="text-xs md:text-sm mt-1 opacity-90 font-light" x-text="realTimeClock"></div>
                </div>
            </div>
            <div class="hidden md:flex items-center space-x-4">
                <template x-if="currentWard">
                    <div class="bg-white/20 px-4 py-1 rounded-full text-sm">
                        <i class="fa-solid fa-hospital-user mr-2"></i>ตึก: <span x-text="currentWard"></span>
                    </div>
                </template>
                <button @click="currentWard = null" x-show="currentWard" class="text-white hover:text-emerald-200 transition">
                    <i class="fa-solid fa-house"></i>
                </button>
            </div>
            <button @click="mobileMenu = !mobileMenu" class="md:hidden text-2xl">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </nav>

    <main class="container mx-auto p-4 md:p-6">
        
        <div x-show="!currentWard" x-cloak>
            <div class="mb-8 text-center">
                <h2 class="text-3xl font-bold text-gray-800">กรุณาเลือกหอผู้ป่วย</h2>
                <p class="text-gray-500">เลือกตึกที่ต้องการเข้าสู่ระบบงานการพยาบาล</p>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <template x-for="ward in wards" :key="ward">
                    <div @click="selectWard(ward)" class="card-hover bg-white p-8 rounded-3xl shadow-sm border-b-8 border-emerald-500 cursor-pointer text-center group">
                        <div class="w-20 h-20 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:bg-emerald-500 group-hover:text-white transition-colors">
                            <i class="fa-solid fa-hospital text-3xl"></i>
                        </div>
                        <h3 class="text-2xl font-bold text-gray-700" x-text="ward"></h3>
                        <p class="text-emerald-600 mt-2 font-semibold">เข้าสู่ระบบ Registry &rarr;</p>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="currentWard" x-cloak>
            <div class="bg-white p-6 rounded-2xl shadow-sm mb-6 border border-gray-100">
                <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-4">
                    <div class="flex items-center space-x-3">
                        <div class="p-3 bg-emerald-100 text-emerald-700 rounded-xl">
                            <i class="fa-solid fa-clipboard-list text-2xl"></i>
                        </div>
                        <div>
                            <h2 class="text-2xl font-bold text-gray-800">IPD Registry</h2>
                            <p class="text-sm text-gray-500">ตึกปาริฉัตร / ตึกสงฆ์อาพาธ</p>
                        </div>
                    </div>
                    
                    <div class="flex flex-wrap gap-2">
                        <select x-model="currentWard" @change="fetchPatients()" class="border-gray-200 rounded-lg text-sm focus:ring-emerald-500">
                            <template x-for="w in wards" :key="w">
                                <option :value="w" x-text="w"></option>
                            </template>
                        </select>
                        <button @click="showAdmitModal = true" class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2 rounded-xl transition shadow-md flex items-center gap-2">
                            <i class="fa-solid fa-user-plus"></i> Admitted ผู้ป่วยใหม่
                        </button>
                    </div>
                </div>

                <hr class="my-4 border-gray-50">

                <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                    <input type="text" x-model="searchHN" placeholder="ค้นหา HN..." class="w-full border-gray-200 rounded-lg text-sm px-4 py-2 focus:ring-2 focus:ring-emerald-500 outline-none">
                    <input type="text" x-model="searchAN" placeholder="ค้นหา AN..." class="w-full border-gray-200 rounded-lg text-sm px-4 py-2 focus:ring-2 focus:ring-emerald-500 outline-none">
                    <input type="text" x-model="searchName" placeholder="ชื่อ-สกุล..." class="w-full border-gray-200 rounded-lg text-sm px-4 py-2 focus:ring-2 focus:ring-emerald-500 outline-none">
                    <input type="text" x-model="searchDoc" placeholder="แพทย์..." class="w-full border-gray-200 rounded-lg text-sm px-4 py-2 focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b border-gray-100">
                            <tr class="text-gray-600 text-sm uppercase tracking-wider">
                                <th class="p-4 font-semibold">เตียง</th>
                                <th class="p-4 font-semibold">HN / AN</th>
                                <th class="p-4 font-semibold">ชื่อ-สกุล</th>
                                <th class="p-4 font-semibold">อายุ</th>
                                <th class="p-4 font-semibold">แผนก/แพทย์</th>
                                <th class="p-4 font-semibold">Admit / LOS</th>
                                <th class="p-4 font-semibold text-center">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-50">
                            <template x-for="p in filteredPatients" :key="p.an">
                                <tr class="hover:bg-emerald-50/30 transition-colors cursor-pointer" @click="openPatientDetail(p)">
                                    <td class="p-4">
                                        <span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full font-bold" x-text="p.bed"></span>
                                    </td>
                                    <td class="p-4">
                                        <div class="font-semibold text-emerald-700" x-text="p.hn"></div>
                                        <div class="text-xs text-gray-400" x-text="p.an"></div>
                                    </td>
                                    <td class="p-4">
                                        <div class="font-bold text-gray-700" x-text="p.name"></div>
                                    </td>
                                    <td class="p-4 text-sm text-gray-600" x-text="p.ageDisplay"></td>
                                    <td class="p-4">
                                        <div class="text-sm font-medium" x-text="p.dept"></div>
                                        <div class="text-xs text-emerald-600" x-text="p.doctor"></div>
                                    </td>
                                    <td class="p-4">
                                        <div class="text-xs text-gray-500" x-text="p.admitDate"></div>
                                        <div class="text-sm font-bold text-orange-600"><span x-text="calculateLOS(p.admitDate)"></span> วัน</div>
                                    </td>
                                    <td class="p-4 text-center">
                                        <button class="text-emerald-500 hover:bg-emerald-100 p-2 rounded-lg">
                                            <i class="fa-solid fa-file-medical text-lg"></i>
                                        </button>
                                    </td>
                                </tr>
                            </template>
                            <template x-if="filteredPatients.length === 0">
                                <tr>
                                    <td colspan="7" class="p-10 text-center text-gray-400 italic">ไม่พบข้อมูลรายชื่อผู้ป่วย</td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div x-show="showAdmitModal" class="modal-container fixed inset-0 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm" x-cloak>
        <div class="bg-white w-full max-w-4xl max-h-[90vh] overflow-y-auto rounded-3xl shadow-2xl relative" @click.outside="showAdmitModal = false">
            <div class="sticky top-0 bg-white border-b p-4 flex justify-between items-center z-10">
                <h3 class="text-xl font-bold text-gray-800">ฟอร์มรับใหม่ (New Admit) - <span x-text="currentWard"></span></h3>
                <button @click="showAdmitModal = false" class="text-gray-400 hover:text-red-500"><i class="fa-solid fa-xmark text-2xl"></i></button>
            </div>
            
            <form @submit.prevent="submitAdmit" class="p-6 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">วันที่รับ</label>
                        <input type="date" x-model="form.date" class="w-full border-gray-200 rounded-lg p-2 bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">เวลารับ</label>
                        <input type="time" x-model="form.time" class="w-full border-gray-200 rounded-lg p-2 bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">เลือกเตียงว่าง</label>
                        <select x-model="form.bed" class="w-full border-gray-200 rounded-lg p-2">
                            <option value="">-- เลือกเตียง --</option>
                            <template x-for="bed in availableBeds" :key="bed">
                                <option :value="bed" x-text="bed"></option>
                            </template>
                        </select>
                    </div>
                </div>

                <div class="bg-emerald-50/50 p-4 rounded-2xl border border-emerald-100 grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="md:col-span-1">
                        <label class="block text-sm font-bold text-emerald-800 mb-1">HN</label>
                        <input type="text" x-model="form.hn" required class="w-full border-emerald-200 rounded-lg p-2 focus:ring-emerald-500">
                    </div>
                    <div class="md:col-span-1">
                        <label class="block text-sm font-bold text-emerald-800 mb-1">AN</label>
                        <input type="text" x-model="form.an" required class="w-full border-emerald-200 rounded-lg p-2 focus:ring-emerald-500">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-emerald-800 mb-1">ชื่อ-สกุล</label>
                        <input type="text" x-model="form.name" required class="w-full border-emerald-200 rounded-lg p-2 focus:ring-emerald-500">
                    </div>
                    <div class="md:col-span-1">
                        <label class="block text-sm font-medium text-gray-700 mb-1">วันเกิด (พ.ศ.)</label>
                        <input type="date" x-model="form.dob" @change="updateAge" class="w-full border-gray-200 rounded-lg p-2">
                    </div>
                    <div class="md:col-span-1">
                        <label class="block text-sm font-medium text-gray-700 mb-1">อายุคำนวณ</label>
                        <input type="text" x-bind:value="form.ageDisplay" readonly class="w-full bg-gray-100 border-gray-200 rounded-lg p-2 text-gray-500">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">แผนก</label>
                        <select x-model="form.dept" class="w-full border-gray-200 rounded-lg p-2">
                            <template x-for="d in configs.depts" :key="d">
                                <option :value="d" x-text="d"></option>
                            </template>
                        </select>
                    </div>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">แพทย์เจ้าของไข้</label>
                        <div class="flex gap-2">
                            <select x-model="form.doctor" class="flex-1 border-gray-200 rounded-lg p-2">
                                <template x-for="doc in doctors" :key="doc">
                                    <option :value="doc" x-text="doc"></option>
                                </template>
                            </select>
                            <button type="button" @click="addNewDoctor" class="bg-gray-100 px-3 rounded-lg text-sm hover:bg-gray-200">+ เพิ่มชื่อแพทย์</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">อาการสำคัญ / แรกรับ</label>
                        <textarea x-model="form.cc" rows="2" class="w-full border-gray-200 rounded-lg p-2"></textarea>
                    </div>
                </div>

                <div class="pt-4 border-t flex justify-end gap-3">
                    <button type="button" @click="showAdmitModal = false" class="px-6 py-2 rounded-xl border border-gray-200 hover:bg-gray-50 transition">ยกเลิก</button>
                    <button type="submit" class="px-8 py-2 rounded-xl bg-emerald-600 text-white hover:bg-emerald-700 shadow-lg transition">บันทึกข้อมูล</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SawangHos IPD Nurse Workbench</title>
    <link rel="icon" type="image/png" href="https://png.pngtree.com/png-vector/20250520/ourmid/pngtree-healthcare-nurse-station-symbol-for-medical-facilities-png-image_16333172.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        [x-cloak] { display: none !important; }
        .hospital-gradient { background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%); }
        .card-hover:hover { transform: translateY(-5px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body x-data="nurseApp()" x-init="init()">

    <div x-show="isLoading" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex flex-col items-center justify-center text-white" style="z-index: 99999;" x-cloak>
        <div class="relative bg-white p-6 rounded-3xl shadow-2xl">
            <div class="animate-spin rounded-full h-16 w-16 border-4 border-emerald-500 border-t-transparent"></div>
            <i class="fa-solid fa-microchip absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-emerald-600 text-xl"></i>
        </div>
        <p class="mt-6 text-xl font-bold tracking-widest text-emerald-400 animate-pulse uppercase">Processing...</p>
    </div>

    <nav class="hospital-gradient text-white shadow-xl sticky top-0 z-[1000] px-4 py-2">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="https://swdcph.moph.go.th/intranet/login/images/logo_swd.png" alt="Logo" class="h-12 w-auto bg-white rounded-full p-1 shadow-sm">
                <div>
                    <h1 class="text-xl md:text-2xl font-bold leading-none">IPD Nurse Workbench</h1>
                    <div class="text-[10px] md:text-xs mt-1 opacity-80 font-light" x-text="realTimeClock"></div>
                </div>
            </div>

            <div class="flex items-center space-x-4">
                <template x-if="currentWard">
                    <div class="flex items-center gap-2">
                        <div class="hidden lg:flex items-center bg-white/10 px-3 py-1 rounded-lg border border-white/20">
                            <span class="text-[10px] uppercase opacity-70 mr-2">รวม</span>
                            <span class="text-sm font-bold text-emerald-300" x-text="patientSummary.total"></span>
                        </div>
                        <div class="bg-emerald-500/30 px-3 py-1 rounded-full text-xs font-bold border border-emerald-400/30">
                            <i class="fa-solid fa-hospital-user mr-2"></i><span x-text="currentWard"></span>
                        </div>
                    </div>
                </template>
                <button @click="currentWard = null" x-show="currentWard" class="w-10 h-10 flex items-center justify-center rounded-xl bg-white/10 hover:bg-white/20 transition-all border border-white/10">
                    <i class="fa-solid fa-house"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 md:p-6">
        
        <div x-show="!currentWard" x-cloak>
            <div class="mb-8 text-center">
                <h2 class="text-3xl font-bold text-gray-800">เลือกหอผู้ป่วย</h2>
                <p class="text-gray-500">IPD Registry & Patient Management System</p>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <template x-for="ward in wards" :key="ward">
                    <div @click="selectWard(ward)" class="card-hover bg-white p-8 rounded-3xl shadow-sm border-b-8 border-emerald-500 cursor-pointer text-center group">
                        <div class="w-20 h-20 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:bg-emerald-500 group-hover:text-white transition-all">
                            <i class="fa-solid fa-hospital text-3xl"></i>
                        </div>
                        <h3 class="text-2xl font-bold text-gray-700" x-text="ward"></h3>
                        <p class="text-emerald-600 mt-2 font-semibold">คลิกเพื่อเข้าสู่ระบบ &rarr;</p>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="currentWard" x-cloak>
            <div class="bg-white p-6 rounded-2xl shadow-sm mb-6 border border-gray-100">
                <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-4">
                    <div>
                        <h2 class="text-2xl font-bold text-gray-800">ทะเบียนผู้ป่วยใน IPD Registry</h2>
                        <p class="text-sm text-gray-400" x-text="patientSummary.deptStr"></p>
                    </div>
                    <button @click="openAdmitForm()" :disabled="isLoading" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-2xl transition shadow-lg flex items-center gap-2 font-bold">
                        <i class="fa-solid fa-user-plus"></i> Admit ผู้ป่วยใหม่
                    </button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mt-6">
                    <input type="text" x-model="searchHN" placeholder="ค้นหา HN..." class="border-gray-200 rounded-xl px-4 py-2 focus:ring-2 focus:ring-emerald-500 outline-none border">
                    <input type="text" x-model="searchName" placeholder="ชื่อ-สกุล..." class="border-gray-200 rounded-xl px-4 py-2 focus:ring-2 focus:ring-emerald-500 outline-none border">
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b border-gray-100">
                            <tr class="text-gray-400 text-xs uppercase tracking-widest font-bold">
                                <th class="p-4 text-center">Chart</th>
                                <th class="p-4">เตียง</th>
                                <th class="p-4">HN / AN</th>
                                <th class="p-4">ชื่อ-สกุล</th>
                                <th class="p-4">แผนก/แพทย์</th>
                                <th class="p-4">Admit/LOS</th>
                                <th class="p-4 text-right">ข้อมูล</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-50">
                            <template x-for="p in filteredPatients" :key="p.an">
                                <tr class="hover:bg-emerald-50/40 transition">
                                    <td class="p-4 text-center">
                                        <button @click.stop="openNursingChart(p.an)" class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-600 hover:text-white transition flex items-center justify-center mx-auto border border-blue-100">
                                            <i class="fa-solid fa-folder-medical"></i>
                                        </button>
                                    </td>
                                    <td class="p-4">
                                        <span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full font-bold text-sm" x-text="p.bed"></span>
                                    </td>
                                    <td class="p-4">
                                        <div class="font-bold text-gray-700" x-text="p.hn"></div>
                                        <div class="text-[10px] text-gray-400" x-text="'AN: '+p.an"></div>
                                    </td>
                                    <td class="p-4 font-semibold text-gray-700" x-text="p.name"></td>
                                    <td class="p-4">
                                        <div class="text-xs font-bold text-gray-600" x-text="p.dept"></div>
                                        <div class="text-[10px] text-emerald-600" x-text="p.doctor"></div>
                                    </td>
                                    <td class="p-4">
                                        <div class="text-xs" x-text="p.date"></div>
                                        <div class="text-[10px] font-bold text-orange-500" x-text="calculateLOS(p.date) + ' วันนอน'"></div>
                                    </td>
                                    <td class="p-4 text-right">
                                        <button @click="openPatientDetail(p)" class="text-emerald-500 hover:text-emerald-700 p-2">
                                            <i class="fa-solid fa-circle-info text-xl"></i>
                                        </button>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div x-show="showAdmitModal" class="fixed inset-0 z-[10001] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm" x-cloak>
        <div class="bg-white w-full max-w-5xl max-h-[90vh] overflow-y-auto rounded-[2rem] shadow-2xl relative">
            <div class="sticky top-0 bg-white border-b p-6 flex justify-between items-center z-10">
                <h3 class="text-xl font-bold text-gray-800" x-text="isEditing ? 'แก้ไขข้อมูลผู้ป่วย' : 'รับผู้ป่วยใหม่ (Admission)'"></h3>
                <button @click="showAdmitModal = false" class="text-gray-400 hover:text-red-500"><i class="fa-solid fa-xmark text-2xl"></i></button>
            </div>
            <form @submit.prevent="submitAdmit" class="p-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 bg-gray-50 p-6 rounded-3xl border border-gray-100">
                    <div class="md:col-span-4 font-bold text-emerald-700 border-b pb-2 mb-2">1. ข้อมูลการรับตัว</div>
                    <div><label class="block text-xs font-bold text-gray-400 uppercase">วันที่</label><input type="date" x-model="form.date" class="w-full border-gray-200 rounded-xl p-3 border"></div>
                    <div><label class="block text-xs font-bold text-gray-400 uppercase">เวลา</label><input type="time" x-model="form.time" class="w-full border-gray-200 rounded-xl p-3 border"></div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase">เตียงว่าง (ตึก <span x-text="currentWard"></span>)</label>
                        <select x-model="form.bed" required class="w-full border-emerald-200 rounded-xl p-3 bg-emerald-50 border">
                            <option value="">-- เลือกเตียง --</option>
                            <template x-for="bed in availableBeds" :key="bed"><option :value="bed" x-text="bed"></option></template>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase">แผนก</label>
                        <select x-model="form.dept" class="w-full border-gray-200 rounded-xl p-3 border">
                            <template x-for="d in configs.depts" :key="d"><option :value="d" x-text="d"></option></template>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-6 gap-4 border p-6 rounded-3xl bg-white border-blue-100">
                    <div class="md:col-span-6 font-bold text-blue-700 border-b pb-2 mb-2">2. ข้อมูลพื้นฐานผู้ป่วย</div>
                    <div class="md:col-span-2"><label class="block text-xs font-bold text-gray-400 uppercase">HN</label><input type="text" x-model="form.hn" required class="w-full border-gray-200 rounded-xl p-3 border"></div>
                    <div class="md:col-span-2"><label class="block text-xs font-bold text-gray-400 uppercase">AN</label><input type="text" x-model="form.an" required class="w-full border-gray-200 rounded-xl p-3 border"></div>
                    <div class="md:col-span-2"><label class="block text-xs font-bold text-gray-400 uppercase">ชื่อ-นามสกุล</label><input type="text" x-model="form.name" required class="w-full border-gray-200 rounded-xl p-3 border"></div>
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-gray-400 uppercase">วันเกิด (พ.ศ.)</label>
                        <input type="text" x-model="form.dobInput" @input="autoFormatDate" @blur="updateAgeFromText" placeholder="วว/ดด/พศ" class="w-full border-blue-200 rounded-xl p-3 font-mono border">
                    </div>
                    <div class="md:col-span-4">
                        <label class="block text-xs font-bold text-gray-400 uppercase">อายุ</label>
                        <input type="text" x-model="form.ageDisplay" readonly class="w-full bg-blue-50 border-none rounded-xl p-3 text-blue-700 font-bold">
                    </div>
                </div>

                <div class="pt-4 border-t flex justify-end gap-3">
                    <button type="button" @click="showAdmitModal = false" class="px-8 py-3 rounded-2xl border border-gray-300 text-gray-600 hover:bg-gray-50 transition">ยกเลิก</button>
                    <button type="submit" class="px-12 py-3 rounded-2xl bg-emerald-600 text-white font-bold shadow-lg hover:bg-emerald-700 transition">บันทึกข้อมูล</button>
                </div>
            </form>
        </div>
    </div>

    <div x-show="showMoveModal" class="fixed inset-0 z-[15000] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm" x-cloak>
        <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden border border-amber-100">
            <div class="bg-amber-500 p-6 text-white flex justify-between items-center">
                <h3 class="text-xl font-bold"><i class="fa-solid fa-arrows-rotate mr-2"></i> ย้ายเตียง / ย้ายตึก</h3>
                <button @click="showMoveModal = false" class="text-white/80 hover:text-white"><i class="fa-solid fa-xmark text-2xl"></i></button>
            </div>
            <div class="p-8 space-y-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">1. เลือกตึกปลายทาง</label>
                    <select x-model="moveForm.targetWard" @change="fetchMoveBeds()" class="w-full border-2 border-gray-100 rounded-2xl p-4 text-lg font-bold text-slate-700 focus:border-amber-400 outline-none transition-all">
                        <template x-for="ward in wards" :key="ward"><option :value="ward" x-text="ward"></option></template>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">2. เลือกเตียงว่างในตึก <span class="text-amber-600" x-text="moveForm.targetWard"></span></label>
                    <select x-model="moveForm.targetBed" class="w-full border-2 border-gray-100 rounded-2xl p-4 text-lg font-bold text-amber-700 focus:border-amber-400 outline-none transition-all">
                        <option value="">-- กรุณาเลือกเตียง --</option>
                        <template x-for="bed in moveBeds" :key="bed"><option :value="bed" x-text="bed"></option></template>
                    </select>
                </div>
                <button @click="confirmMove()" :disabled="!moveForm.targetBed" class="w-full bg-amber-600 text-white py-5 rounded-2xl font-bold text-xl shadow-lg shadow-amber-200 hover:bg-amber-700 disabled:bg-gray-200 transition">ยืนยันการย้าย</button>
            </div>
        </div>
    </div>

    <div x-show="dialog.show" class="fixed inset-0 z-[20000] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md" x-cloak>
        <div class="bg-white rounded-[2rem] shadow-2xl max-w-sm w-full overflow-hidden text-center transform transition-all">
            <div class="p-8">
                <template x-if="dialog.type === 'alert'"><div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4 animate-bounce"><i class="fa-solid fa-check text-4xl"></i></div></template>
                <template x-if="dialog.type === 'confirm'"><div class="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fa-solid fa-triangle-exclamation text-4xl"></i></div></template>
                
                <h3 class="text-2xl font-bold text-slate-800 mb-2" x-text="dialog.title"></h3>
                <p class="text-slate-500 mb-6" x-text="dialog.msg"></p>

                <div class="flex gap-3">
                    <template x-if="dialog.type !== 'alert'"><button @click="dialog.show = false" class="flex-1 py-4 rounded-2xl font-bold text-slate-400 hover:bg-slate-50 transition">ยกเลิก</button></template>
                    <button @click="handleDialogConfirm()" :class="dialog.type === 'confirm' ? 'bg-red-600 hover:bg-red-700' : 'bg-emerald-600 hover:bg-emerald-700'" class="flex-1 py-4 rounded-2xl font-bold text-white shadow-lg transition" x-text="dialog.confirmBtnText"></button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
